name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Related component
      options:
        - Report Ingestion
        - LLM Classification
        - Scoring Engine
        - Dashboard API
        - Notifications
        - Escalation
        - EHR Integration
        - New component
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem this solves
      placeholder: What clinical or operational problem does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: This request does not include real patient data
          required: true
